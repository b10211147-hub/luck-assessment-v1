<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>運勢改善健檢｜奉母宮x神明仲介所</title>
  <meta name="description" content="提供感情、事業、財運、家運短版與完整版本的運勢改善健檢。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section id="landing" class="panel hero">
      <p class="eyebrow">奉母宮x神明仲介所</p>
      <h1>運勢改善健檢</h1>
      <p id="landingLead" class="lead">先選擇這次最想了解的主題，再開始作答。</p>

      <fieldset class="mode-picker">
        <legend>想了解哪個面向？</legend>
        <div class="mode-options">
          <label class="mode-option">
            <input type="radio" name="quizMode" value="love" />
            <span><strong>感情</strong><small>感情、人際、內在</small></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="quizMode" value="career" />
            <span><strong>事業</strong><small>事業、財運、人際</small></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="quizMode" value="wealth" />
            <span><strong>財運</strong><small>財運、事業、整體</small></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="quizMode" value="home" />
            <span><strong>家運</strong><small>家運、人際、內在</small></span>
          </label>
          <label class="mode-option">
            <input type="radio" name="quizMode" value="full" />
            <span><strong>完整版</strong><small>八大面向完整盤點</small></span>
          </label>
        </div>
      </fieldset>

      <div class="notice">
        <strong>作答提醒</strong>
        <p id="modeNotice">請先選擇一個測驗主題。作答時請依最近三至六個月的真實狀況回答。</p>
      </div>
      <div class="form-grid compact">
        <label>姓名或暱稱<input id="nameInput" type="text" placeholder="例如：小安" /></label>
        <label>LINE 名稱<input id="lineInput" type="text" placeholder="可留空" /></label>
        <label class="full">目前最想改善的問題<textarea id="concernInput" rows="3" placeholder="例如：工作停滯、感情反覆、財運不穩"></textarea></label>
      </div>
      <button id="startBtn" class="primary" disabled>選擇主題後開始</button>
    </section>

    <section id="quiz" class="panel hidden">
      <div class="topbar">
        <div>
          <p id="sectionLabel" class="eyebrow"></p>
          <h2 id="questionCounter"></h2>
        </div>
        <div class="topbar-actions">
          <button id="changeModeBtn" class="ghost">更換主題</button>
          <button id="saveBtn" class="ghost">儲存進度</button>
        </div>
      </div>
      <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
      <article id="questionCard" class="question-card"></article>
      <div class="actions">
        <button id="prevBtn" class="secondary">上一題</button>
        <button id="nextBtn" class="primary">下一題</button>
      </div>
    </section>

    <section id="result" class="panel hidden">
      <div class="result-head">
        <div>
          <p id="resultEyebrow" class="eyebrow">你的初步結果</p>
          <h2 id="typeCode"></h2>
          <p id="typeName" class="lead"></p>
        </div>
        <button id="restartBtn" class="ghost">重新選擇</button>
      </div>

      <section id="omenResult" class="omen-result hidden" aria-labelledby="omenTitle">
        <div class="omen-heading">
          <div>
            <p id="omenCode" class="omen-kicker"></p>
            <h3 id="omenTitle"></h3>
          </div>
          <div class="omen-fortune"><span>吉凶</span><strong id="omenFortune"></strong></div>
        </div>

        <div class="omen-layout">
          <div class="omen-symbol" aria-hidden="true">
            <i class="omen-ray"></i><i class="omen-ray"></i><i class="omen-ray"></i><i class="omen-ray"></i>
            <i class="omen-ray"></i><i class="omen-ray"></i><i class="omen-ray"></i>
            <div class="omen-sun"></div>
            <div class="omen-gate"></div>
            <div class="omen-path"></div>
          </div>

          <div class="omen-body">
            <div class="omen-copy-block omen-verse">
              <h4>讖曰</h4>
              <p id="omenVerse"></p>
            </div>
            <div class="omen-copy-block">
              <h4>解曰</h4>
              <p id="omenExplanation"></p>
            </div>
            <dl class="omen-guidance">
              <div><dt>宜</dt><dd id="omenSuitable"></dd></div>
              <div><dt>忌</dt><dd id="omenAvoid"></dd></div>
              <div><dt>補運方向</dt><dd id="omenDirection"></dd></div>
            </dl>
          </div>
        </div>
      </section>

      <section class="result-section public-result">
        <h3>類型描述</h3>
        <div id="typeDescription" class="result-copy"></div>
      </section>

      <section class="result-section public-result">
        <h3>目前面臨的困境</h3>
        <div id="challengeSummary" class="result-copy"></div>
      </section>

      <section class="result-section public-result">
        <h3>大概可以怎麼改善</h3>
        <div id="improvementSummary" class="result-copy"></div>
      </section>

      <section id="submitResultPanel" class="result-section submit-result hidden">
        <h3>送出結果</h3>
        <label class="consent-row"><input id="submitConsent" type="checkbox" />我同意將本次作答結果送交奉母宮x神明仲介所保存與後續評估。</label>
        <button id="submitResultBtn" class="primary">送出結果</button>
        <p id="submitStatus" class="submit-status"></p>
      </section>

      <p class="disclaimer">本測驗僅作為近期狀態與運勢傾向盤點，不屬於命運定論。</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
