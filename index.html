<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#8f1d2c">
  <title>奉母宮｜線上祈福報名</title>
  <meta name="description" content="奉母宮線上祈福活動報名與進度查詢">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="#top"><span class="brand__mark">奉</span><div><b>奉母宮</b><small>線上祈福服務</small></div></a>
      <span class="header-note">一站式線上報名</span>
    </div>
  </header>
  <header id="top" class="hero">
    <div class="hero__shade"></div>
    <div class="hero__copy">
      <p class="eyebrow">心誠則靈・福澤綿長</p>
      <h1>線上祈福<br><span>安心完成報名</span></h1>
      <p>選擇法會、填寫祈福資料，即可取得專屬報名編號。</p>
    </div>
  </header>

  <main>
    <nav id="events" class="tabs" aria-label="主要功能">
      <button class="tab is-active" data-view="activities">活動報名</button>
      <button class="tab" data-view="orders">我的報名</button>
    </nav>

    <section id="activitiesView" class="view">
      <div class="section-heading"><div><span>近期法會</span><h2>選擇祈福活動</h2></div><p>左右滑動查看更多</p></div>
      <div id="activityList" class="activity-list" aria-live="polite"></div>
    </section>

    <section id="formView" class="view is-hidden">
      <button id="backBtn" class="back-btn">← 返回活動</button>
      <div id="selectedActivity" class="selected-activity"></div>
      <form id="registrationForm" class="form-card">
        <div class="step-title"><span>01</span><div><small>報名資料</small><h2>填寫祈福資料</h2></div></div>
        <label>報名人姓名<span>*</span><input name="name" autocomplete="name" required placeholder="請輸入真實姓名"></label>
        <label>生日（國曆）<span>*</span><input name="birthday" type="text" inputmode="numeric" autocomplete="bday" placeholder="yyyy/mm/dd" pattern="\d{4}/\d{2}/\d{2}" maxlength="10" title="請依 yyyy/mm/dd 格式輸入，例如 1990/01/02" required></label>
        <label>居住地址（最常待的地方）<span>*</span><input name="address" autocomplete="street-address" required placeholder="請填寫平時最常居住的完整地址"></label>
        <label>祈福人數<span>*</span><select name="people" required></select></label>
        <label>祈福姓名<textarea name="prayerNames" rows="3" placeholder="多人請以頓號分隔，例如：王大明、王小美"></textarea></label>
        <label>備註<textarea name="note" rows="3" placeholder="其他需要協助的事項"></textarea></label>
        <div class="consent"><input id="consent" type="checkbox" required><label for="consent">我確認資料正確，並同意為本次報名用途使用。</label></div>
        <div class="total"><span>報名費用</span><strong id="totalPrice">隨喜</strong></div>
        <button class="primary-btn" type="submit">確認送出報名</button>
      </form>
    </section>

    <section id="successView" class="view is-hidden">
      <div class="success-card"><div class="success-icon">✓</div><p>報名資料已送出</p><h2>祈福報名成功</h2><div id="orderSummary"></div><button id="newOrderBtn" class="primary-btn">返回活動列表</button></div>
    </section>

    <section id="ordersView" class="view is-hidden">
      <div class="section-heading"><div><span>進度查詢</span><h2>查詢我的報名</h2></div></div>
      <form id="lookupForm" class="lookup-card"><label>專屬報名編號<input name="id" autocomplete="off" required placeholder="例如 FM202607161234"></label><button class="primary-btn">查詢報名紀錄</button></form>
      <div id="orderList" class="order-list"></div>
    </section>

  </main>
  <footer><b>奉母宮</b><span>一站式線上祈福報名</span></footer>
  <div id="toast" class="toast" role="status"></div>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="app.js"></script>
</body>
</html>
